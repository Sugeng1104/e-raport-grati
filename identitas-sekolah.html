<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identitas Sekolah - UPT SDN Ranuklindungan I</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-800 relative">

    <header class="bg-[#1e6ca8] text-white p-4 shadow-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🏛️</span>
                <h1 class="text-xl font-bold tracking-wide" id="headerNamaSekolah">Memuat Data...</h1>
            </div>
            
            <div class="flex items-center space-x-2 bg-white/10 p-1.5 rounded-xl border border-white/20">
                <select id="pilihanEdit" class="bg-slate-800 text-white text-sm font-semibold px-3 py-2 rounded-lg border border-slate-700 focus:outline-none focus:ring-2 focus:ring-amber-400">
                    <option value="identitas">🗄️ Profil & Personalia</option>
                    <option value="mapel">📚 Mata Pelajaran</option>
                    <option value="ekskul">🏅 Ekstrakurikuler</option>
                </select>
                <button onclick="bukaPopupEdit()" class="bg-amber-400 hover:bg-amber-500 text-slate-900 font-bold px-4 py-2 rounded-lg shadow transition flex items-center space-x-1 text-sm">
                    <span>✏️</span> <span>Edit</span>
                </button>
            </div>

            <a href="index.html" class="bg-white/20 hover:bg-white/30 text-white font-medium px-4 py-2 rounded-lg transition text-sm flex items-center space-x-1">
                <span>⬅️</span> <span>Kembali ke Hub Utama</span>
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-6">
        
        <div id="loadingState" class="text-center py-12 bg-white rounded-2xl shadow-sm border border-slate-200">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent mb-2"></div>
            <p class="text-slate-500 font-medium">Menarik data dari Google Sheets Anda secara Real-time...</p>
        </div>

        <div id="mainContent" class="grid grid-cols-1 lg:grid-cols-12 gap-6 hidden">
            <section class="lg:col-span-7 space-y-6">
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-900 border-b pb-3 mb-4 flex items-center space-x-2">
                        <span class="text-blue-500">🏛️</span> <span>Profil & Legalitas Sekolah</span>
                    </h2>
                    <dl class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-3 text-sm" id="dataProfil"></dl>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-900 border-b pb-3 mb-4 flex items-center space-x-2">
                        <span class="text-emerald-500">👥</span> <span>Manajemen Personalia & Tahun Ajaran</span>
                    </h2>
                    <dl class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-3 text-sm" id="dataPersonalia"></dl>
                </div>
            </section>

            <section class="lg:col-span-5 space-y-6">
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-900 border-b pb-3 mb-3 flex items-center space-x-2">
                        <span class="text-indigo-500">📚</span> <span>Daftar Mata Pelajaran</span>
                    </h2>
                    <div class="overflow-hidden border border-slate-200 rounded-xl">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="bg-slate-50 text-slate-600 font-semibold border-b border-slate-200">
                                    <th class="p-3 w-16 text-center">No</th>
                                    <th class="p-3">Nama Mata Pelajaran</th>
                                </tr>
                            </thead>
                            <tbody id="tabelMapel" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-900 border-b pb-3 mb-3 flex items-center space-x-2">
                        <span class="text-amber-500">🏅</span> <span>Kegiatan Ekstrakurikuler</span>
                    </h2>
                    <div class="overflow-hidden border border-slate-200 rounded-xl">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="bg-slate-50 text-slate-600 font-semibold border-b border-slate-200">
                                    <th class="p-3 w-16 text-center">ID</th>
                                    <th class="p-3">Ekstrakurikuler</th>
                                </tr>
                            </thead>
                            <tbody id="tabelEkskul" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="popupModalEdit" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl border border-slate-200 flex flex-col max-h-[85vh] animate-in fade-in zoom-in-95 duration-200">
            <div class="p-5 border-b flex justify-between items-center bg-slate-50 rounded-t-2xl">
                <div class="flex items-center space-x-2 text-slate-900">
                    <span class="text-xl">📝</span>
                    <h2 id="judulPopup" class="font-bold text-lg">Edit Form Data</h2>
                </div>
                <button onclick="tutupPopupEdit()" class="text-slate-400 hover:text-slate-600 font-bold p-1 text-lg">&times;</button>
            </div>
            
            <form id="formDinamis" class="p-6 overflow-y-auto space-y-4 flex-grow text-sm">
            </form>
            
            <div class="p-4 border-t bg-slate-50 rounded-b-2xl flex justify-end space-x-2">
                <button type="button" onclick="tutupPopupEdit()" class="px-4 py-2 border border-slate-300 rounded-xl text-slate-700 font-medium hover:bg-slate-100 transition text-sm">Batal</button>
                <button type="button" onclick="eksekusiSimpanData()" id="btnSimpan" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow transition text-sm flex items-center space-x-2">
                    <span>💾</span> <span>Simpan</span>
                </button>
            </div>
        </div>
    </div>

    <script>
    // 1. PASTE URL WEB APP BARU ANDA DI SINI
    const API_SHEET_URL = "https://script.google.com/macros/s/AKfycby8wrF_rxNEyX4Q0IMSrUmadkzzbdasBiZUgi-WKT_vyqHF2YBOU75QfZmkSSjDgrYt/exec";
    
    let DATABASE_CACHE = null;

    function cetakBarisInfo(label, value) {
        if (!value && value !== 0) return '';
        return `
            <div class="py-2 border-b border-slate-100">
                <dt class="text-xs font-bold text-slate-400 uppercase tracking-wide">${label}</dt>
                <dd class="text-sm font-semibold text-slate-700 mt-0.5">${value}</dd>
            </div>
        `;
    }

    async function ambilDataIdentitas() {
        try {
            const respon = await fetch(`${API_SHEET_URL}?action=getDashboardSummary`, {
                method: "GET",
                mode: "cors",
                redirect: "follow" 
            });
            
            const jsonRespon = await respon.json();
            if (jsonRespon.status !== "SUCCESS") throw new Error(jsonRespon.message || "Gagal memuat.");
            
            // Simpan profil asli ke dalam objek cache agar popup edit bisa membacanya
            DATABASE_CACHE = {
                status: "SUCCESS",
                profil: jsonRespon.profil || {},
                summary: jsonRespon.summary
            };

            // Menampilkan Profil Utama Sekolah ke halaman web
            let htmlProfil = "";
            const listGrupProfil = ["Nama Sekolah", "NPSN", "NSS", "Alamat Sekolah", "Kode Pos", "Desa / Kelurahan", "Kecamatan", "Kabupaten", "Provinsi", "Website", "E-mail"];
            
            listGrupProfil.forEach(key => {
                if (DATABASE_CACHE.profil[key]) {
                    htmlProfil += cetakBarisInfo(key, DATABASE_CACHE.profil[key]);
                }
            });
            document.getElementById('dataProfil').innerHTML = htmlProfil || `<p class="text-slate-400 italic">Belum ada data profil dasar.</p>`;
            
            if (DATABASE_CACHE.profil["Nama Sekolah"]) {
                document.getElementById('headerNamaSekolah').innerText = DATABASE_CACHE.profil["Nama Sekolah"];
            }

            // Menampilkan Waktu & Personalia Kepegawaian
            let htmlPersonalia = "";
            Object.keys(DATABASE_CACHE.profil).forEach(key => {
                if (!listGrupProfil.includes(key)) {
                    htmlPersonalia += cetakBarisInfo(key, DATABASE_CACHE.profil[key]);
                }
            });
            
            // Tambahkan baris ringkasan counter statis di bagian bawah personalia
            htmlPersonalia += cetakBarisInfo("Total Siswa Terdaftar", DATABASE_CACHE.summary.totalSiswa + " Anak");
            htmlPersonalia += cetakBarisInfo("Jumlah Mata Pelajaran", DATABASE_CACHE.summary.totalMapel + " Kompetensi");
            htmlPersonalia += cetakBarisInfo("Jumlah Ekstrakurikuler", DATABASE_CACHE.summary.totalEkskul + " Kegiatan");
            document.getElementById('dataPersonalia').innerHTML = htmlPersonalia;

            // Tampilkan pesan informatif pada tabel menu kanan
            document.getElementById('tabelMapel').innerHTML = `
                <tr class="hover:bg-slate-50 transition"><td class="p-3 text-center font-bold text-blue-500 bg-slate-50/50">✓</td><td class="p-3 font-medium text-slate-500 italic">Terdeteksi ${DATABASE_CACHE.summary.totalMapel} Mapel di Google Sheets</td></tr>`;
            document.getElementById('tabelEkskul').innerHTML = `
                <tr class="hover:bg-slate-50 transition"><td class="p-3 text-center font-bold text-amber-500 bg-slate-50/50">✓</td><td class="p-3 font-medium text-slate-500 italic">Terdeteksi ${DATABASE_CACHE.summary.totalEkskul} Ekskul di Google Sheets</td></tr>`;

            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');

        } catch (error) {
            console.error(error);
            document.getElementById('loadingState').innerHTML = `
                <div class="p-4 text-red-600 bg-red-50 rounded-xl border border-red-200 inline-block text-left max-w-md">
                    <p class="font-bold">⚠️ Gagal Memproses Sinkronisasi Data</p>
                    <p class="text-xs text-slate-500 mt-1">Detail Masalah: ${error.message}</p>
                </div>
            `;
        }
    }

    function bukaPopupEdit() {
        if (!DATABASE_CACHE) return alert("Data belum termuat sempurna. Mohon tunggu.");
        
        const pilihan = document.getElementById('pilihanEdit').value;
        const form = document.getElementById('formDinamis');
        const judul = document.getElementById('judulPopup');
        form.innerHTML = ""; 
        form.setAttribute('data-tipe', pilihan);

        if (pilihan === "identitas") {
            judul.innerText = "Edit Profil & Personalia Sekolah";
            Object.keys(DATABASE_CACHE.profil).forEach(key => {
                form.innerHTML += buatElemenInputForm(key, DATABASE_CACHE.profil[key]);
            });
        } else {
            judul.innerText = pilihan === "mapel" ? "Tambah Mata Pelajaran Baru" : "Tambah Ekstrakurikuler Baru";
            form.innerHTML = `
                <div class="p-4 bg-amber-50 rounded-xl border border-amber-200 text-amber-800 text-xs mb-2 leading-relaxed">
                    Silakan masukkan nama entitas baru untuk menambah baris manifests pada database Google Sheets Anda secara otomatis.
                </div>
                ${buatElemenInputForm("Nama Entitas Baru", "", "Masukkan Nama Baru Di Sini")}
            `;
        }

        document.getElementById('popupModalEdit').classList.remove('hidden');
    }

    function buatElemenInputForm(idKolom, nilaiLama, subLabel = "Manajemen Nilai") {
        return `
            <div class="flex flex-col space-y-1 bg-slate-50 p-3 rounded-xl border border-slate-200">
                <label class="font-bold text-slate-800 text-xs uppercase tracking-wide">${idKolom}</label>
                <span class="text-[10px] text-slate-400 font-medium">${subLabel}</span>
                <input type="text" name="${idKolom}" value="${nilaiLama}" class="w-full mt-1 p-2 bg-white rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 font-semibold text-slate-700 shadow-inner" required>
            </div>
        `;
    }

    function tutupPopupEdit() {
        document.getElementById('popupModalEdit').classList.add('hidden');
    }

    async function eksekusiSimpanData() {
        const form = document.getElementById('formDinamis');
        const tipe = form.getAttribute('data-tipe');
        const btnSimpan = document.getElementById('btnSimpan');
        
        const formData = new FormData(form);
        const payload = {};
        formData.forEach((value, key) => {
            payload[key] = value;
        });

        btnSimpan.disabled = true;
        btnSimpan.innerHTML = `<span>⏳</span> <span>Memproses...</span>`;

        try {
            // Menggunakan fetch POST dengan header text/plain agar menghindari preflight CORS pre-check dari browser
            const respon = await fetch(API_SHEET_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ tipe: tipe, payload: payload }),
                redirect: "follow"
            });

            const hasil = await respon.json();
            
            if (hasil.status === "SUCCESS") {
                alert("Data berhasil disimpan!");
            } else {
                alert("Pemberitahuan: " + (hasil.message || "Proses selesai dilakukan."));
            }
            
            tutupPopupEdit();
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            await ambilDataIdentitas();

        } catch (error) {
            console.error(error);
            // Fallback jika respon redirect google dianggap gagal oleh browser tetapi data sebenarnya masuk
            alert("Data sedang disinkronkan ke Google Sheets! Halaman akan dimuat ulang.");
            tutupPopupEdit();
            window.location.reload();
        } finally {
            btnSimpan.disabled = false;
            btnSimpan.innerHTML = `<span>💾</span> <span>Simpan</span>`;
        }
    }

    window.onload = ambilDataIdentitas;
</script>
</body>
</html>
