<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identitas Sekolah - SDN RANUKLINDUNGAN I</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-800 relative">

    <header class="bg-[#1e6ca8] text-white p-4 shadow-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🏛️</span>
                <h1 class="text-xl font-bold tracking-wide" id="headerNamaSekolah">SDN RANUKLINDUNGAN I</h1>
            </div>
            
            <div class="flex items-center space-x-2 bg-white/10 p-1.5 rounded-xl border border-white/20">
                <select id="pilihanEdit" class="bg-slate-800 text-white text-sm font-semibold px-3 py-2 rounded-lg border border-slate-700 focus:outline-none focus:ring-2 focus:ring-amber-400">
                    <option value="identitas">🗄️ Profil & Personalia</option>
                    <option value="mapel">📚 Mata Pelajaran</option>
                    <option value="ekskul">🏅 Ekstrakurikuler</option>
                </select>
                <button onclick="bukaPopupEdit()" class="bg-amber-400 hover:bg-amber-500 text-slate-900 font-bold px-4 py-2 rounded-lg shadow transition flex items-center space-x-1 text-sm">
                    <span>✏️</span> <span>Kelola</span>
                </button>
            </div>

            <a href="index.html" class="bg-white/20 hover:bg-white/30 text-white font-medium px-4 py-2 rounded-lg transition text-sm flex items-center space-x-1">
                <span>⬅️</span> <span>Kembali</span>
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-6">
        
        <div id="loadingState" class="text-center py-12 bg-white rounded-2xl shadow-sm border border-slate-200">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent mb-2"></div>
            <p class="text-slate-500 font-medium">Menghubungkan ke Google Sheets secara Real-time...</p>
        </div>

        <div id="mainContent" class="grid grid-cols-1 lg:grid-cols-12 gap-6 hidden">
            
            <section class="lg:col-span-7 space-y-6">
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-900 border-b pb-3 mb-4 flex items-center space-x-2">
                        <span class="text-slate-500">🏛️</span> <span>Profil & Legalitas Sekolah</span>
                    </h2>
                    <dl class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4 text-sm" id="dataProfil"></dl>
                </div>
            </section>

            <section class="lg:col-span-5 space-y-6">
                
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center border-b pb-3 mb-4">
                        <h2 class="text-lg font-bold text-slate-900 flex items-center space-x-2">
                            <span class="text-indigo-500">📚</span> <span>Ringkasan Mata Pelajaran</span>
                        </h2>
                        <span id="badgeMapel" class="px-3 py-0.5 bg-indigo-100 text-indigo-700 font-semibold rounded-full text-xs">0 Mapel</span>
                    </div>
                    <div id="listMapelContainer" class="space-y-2 max-h-[290px] overflow-y-auto pr-1"></div>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center border-b pb-3 mb-4">
                        <h2 class="text-lg font-bold text-slate-900 flex items-center space-x-2">
                            <span class="text-amber-500">🏅</span> <span>Ringkasan Ekstrakurikuler</span>
                        </h2>
                        <span id="badgeEkskul" class="px-3 py-0.5 bg-amber-100 text-amber-700 font-semibold rounded-full text-xs">0 Kegiatan</span>
                    </div>
                    <div id="listEkskulContainer" class="space-y-2 max-h-[200px] overflow-y-auto pr-1"></div>
                </div>

            </section>
        </div>
    </main>

    <div id="popupModalEdit" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl border border-slate-200 flex flex-col max-h-[85vh]">
            <div class="p-5 border-b flex justify-between items-center bg-slate-50 rounded-t-2xl">
                <div class="flex items-center space-x-2 text-slate-900">
                    <span class="text-xl">📝</span>
                    <h2 id="judulPopup" class="font-bold text-lg">Kelola Data</h2>
                </div>
                <button onclick="tutupPopupEdit()" class="text-slate-400 hover:text-slate-600 font-bold p-1 text-lg">&times;</button>
            </div>
            
            <form id="formDinamis" class="p-6 overflow-y-auto space-y-4 flex-grow text-sm">
                </form>
            
            <div class="p-4 border-t bg-slate-50 rounded-b-2xl flex justify-end space-x-2">
                <button type="button" onclick="tutupPopupEdit()" class="px-4 py-2 border border-slate-300 rounded-xl text-slate-700 font-medium hover:bg-slate-100 transition text-sm">Batal</button>
                <button type="button" onclick="eksekusiSimpanData()" id="btnSimpan" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow transition text-sm flex items-center space-x-2">
                    <span>💾</span> <span>Simpan Data</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Masukkan URL Web App Apps Script Anda di sini
        const API_SHEET_URL = "https://script.google.com/macros/s/AKfycby8wrF_rxNEyX4Q0IMSrUmadkzzbdasBiZUgi-WKT_vyqHF2YBOU75QfZmkSSjDgrYt/exec";
        
        let DATA_PROFIL_CACHE = [];
        let DATA_MAPEL_CACHE = [];
        let DATA_EKSKUL_CACHE = [];

        function buatElemenIdentitas(label, value) {
            return `
                <div class="border-b border-slate-100 pb-2">
                    <dt class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">${label}</dt>
                    <dd class="text-sm font-semibold text-slate-700 mt-0.5">${value || "-"}</dd>
                </div>
            `;
        }

        function buatElemenBarisKanan(index, nama, tipe) {
            const warnaBord = tipe === 'mapel' ? 'border-l-indigo-500' : 'border-l-amber-500';
            return `
                <div class="flex items-center space-x-3 p-2.5 bg-slate-50 rounded-xl border border-slate-100 border-l-4 ${warnaBord}">
                    <span class="text-xs font-bold text-slate-400 w-5 text-center">${index}</span>
                    <span class="text-sm font-semibold text-slate-700">${nama}</span>
                </div>
            `;
        }

        async function ambilDataIdentitas() {
            try {
                const respon = await fetch(`${API_SHEET_URL}?action=getDashboardSummary`, {
                    method: "GET",
                    mode: "cors"
                });
                
                const jsonRespon = await respon.json();
                if (jsonRespon.status !== "SUCCESS") throw new Error(jsonRespon.message);
                
                if (jsonRespon.summary && jsonRespon.summary.namaSekolah) {
                    document.getElementById('headerNamaSekolah').innerText = jsonRespon.summary.namaSekolah;
                }

                DATA_PROFIL_CACHE = jsonRespon.profil || [];
                DATA_MAPEL_CACHE = jsonRespon.mapel || [];
                DATA_EKSKUL_CACHE = jsonRespon.ekskul || [];

                // 1. Render data Profil Kiri (Kolom A & B)
                let htmlProfil = "";
                DATA_PROFIL_CACHE.forEach(item => {
                    htmlProfil += buatElemenIdentitas(item.kunci, item.nilai);
                });
                document.getElementById('dataProfil').innerHTML = htmlProfil || '<p class="text-slate-400 italic">Data profil kosong.</p>';

                // 2. Render List Nama Mata Pelajaran (Kolom D)
                let htmlMapelList = "";
                DATA_MAPEL_CACHE.forEach((item, index) => {
                    htmlMapelList += buatElemenBarisKanan(index + 1, item.nama, 'mapel');
                });
                document.getElementById('listMapelContainer').innerHTML = htmlMapelList || '<p class="text-slate-400 text-sm italic pl-2">Belum ada mata pelajaran terdaftar.</p>';
                document.getElementById('badgeMapel').innerText = DATA_MAPEL_CACHE.length + " Mata Pelajaran";

                // 3. Render List Nama Ekstrakurikuler (Kolom F)
                let htmlEkskulList = "";
                DATA_EKSKUL_CACHE.forEach((item, index) => {
                    htmlEkskulList += buatElemenBarisKanan(index + 1, item.nama, 'ekskul');
                });
                document.getElementById('listEkskulContainer').innerHTML = htmlEkskulList || '<p class="text-slate-400 text-sm italic pl-2">Belum ada ekstrakurikuler terdaftar.</p>';
                document.getElementById('badgeEkskul').innerText = DATA_EKSKUL_CACHE.length + " Kegiatan";

                // Tampilkan Konten Utama
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');

            } catch (error) {
                console.error(error);
                document.getElementById('loadingState').innerHTML = `
                    <div class="p-4 text-red-600 bg-red-50 rounded-xl border border-red-200 inline-block text-left max-w-md mx-auto">
                        <p class="font-bold">⚠️ Gagal Sinkronisasi</p>
                        <p class="text-xs text-slate-500 mt-1">Detail: ${error.message}</p>
                    </div>`;
            }
        }

        function bukaPopupEdit() {
            const pilihan = document.getElementById('pilihanEdit').value;
            const form = document.getElementById('formDinamis');
            const judul = document.getElementById('judulPopup');
            form.innerHTML = ""; 
            form.setAttribute('data-tipe', pilihan);

            if (pilihan === "identitas") {
                judul.innerText = "Kelola Profil & Personalia (Kolom A & B)";
                DATA_PROFIL_CACHE.forEach(item => {
                    form.innerHTML += `
                        <div class="flex flex-col space-y-1 bg-slate-50 p-3 rounded-xl border border-slate-200">
                            <label class="font-bold text-slate-800 text-xs uppercase tracking-wide">${item.kunci}</label>
                            <input type="text" name="${item.kunci}" value="${item.nilai}" class="w-full mt-1 p-2 bg-white rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 font-semibold text-slate-700 shadow-inner">
                        </div>`;
                });
            } 
            else if (pilihan === "mapel") {
                judul.innerText = "Kelola Data Mata Pelajaran (Kolom D)";
                let html = `<div class="p-2.5 bg-indigo-50 border border-indigo-100 text-indigo-800 rounded-xl text-xs font-bold mb-2">✏️ UBAH NAMA MATA PELAJARAN:</div>`;
                
                DATA_MAPEL_CACHE.forEach((item, index) => {
                    html += `
                        <div class="flex flex-col space-y-1 bg-slate-50 p-3 rounded-xl border border-slate-200">
                            <label class="font-bold text-indigo-700 text-xs uppercase tracking-wide">Baris ${item.barisIndex} (Mapel ${index+1})</label>
                            <input type="text" name="update_mapel_row_${item.barisIndex}" value="${item.nama}" class="w-full mt-1 p-2 bg-white rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-semibold text-slate-700">
                        </div>`;
                });

                html += `
                    <div class="p-2.5 bg-emerald-50 border border-emerald-100 text-emerald-800 rounded-xl text-xs font-bold mt-4 mb-2">➕ TAMBAH DATA BARU:</div>
                    <div class="flex flex-col space-y-1 bg-slate-100 p-3 rounded-xl border border-slate-300">
                        <label class="font-bold text-emerald-800 text-xs uppercase tracking-wide">Nama Mata Pelajaran Baru</label>
                        <input type="text" name="Nama Mapel Baru" placeholder="Masukkan mapel baru jika ada..." class="w-full mt-1 p-2 bg-white rounded-lg border border-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-500 font-semibold text-slate-700">
                    </div>`;
                form.innerHTML = html;
            } 
            else if (pilihan === "ekskul") {
                judul.innerText = "Kelola Data Ekstrakurikuler (Kolom F)";
                let html = `<div class="p-2.5 bg-amber-50 border border-amber-100 text-amber-800 rounded-xl text-xs font-bold mb-2">✏️ UBAH NAMA EKSTRAKURIKULER:</div>`;
                
                DATA_EKSKUL_CACHE.forEach((item, index) => {
                    html += `
                        <div class="flex flex-col space-y-1 bg-slate-50 p-3 rounded-xl border border-slate-200">
                            <label class="font-bold text-amber-700 text-xs uppercase tracking-wide">Baris ${item.barisIndex} (Ekskul ${index+1})</label>
                            <input type="text" name="update_ekskul_row_${item.barisIndex}" value="${item.nama}" class="w-full mt-1 p-2 bg-white rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-amber-500 font-semibold text-slate-700">
                        </div>`;
                });

                html += `
                    <div class="p-2.5 bg-emerald-50 border border-emerald-100 text-emerald-800 rounded-xl text-xs font-bold mt-4 mb-2">➕ TAMBAH DATA BARU:</div>
                    <div class="flex flex-col space-y-1 bg-slate-100 p-3 rounded-xl border border-slate-300">
                        <label class="font-bold text-emerald-800 text-xs uppercase tracking-wide">Nama Ekstrakurikuler Baru</label>
                        <input type="text" name="Nama Ekskul Baru" placeholder="Masukkan ekskul baru jika ada..." class="w-full mt-1 p-2 bg-white rounded-lg border border-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-500 font-semibold text-slate-700">
                    </div>`;
                form.innerHTML = html;
            }

            document.getElementById('popupModalEdit').classList.remove('hidden');
        }

        function tutupPopupEdit() {
            document.getElementById('popupModalEdit').classList.add('hidden');
        }

        async function eksekusiSimpanData() {
            const form = document.getElementById('formDinamis');
            const tipe = form.getAttribute('data-tipe');
            const btnSimpan = document.getElementById('btnSimpan');
            
            const formData = new FormData(form);
            const payload = {};
            formData.forEach((value, key) => {
                payload[key] = value;
            });

            btnSimpan.disabled = true;
            btnSimpan.innerHTML = `<span>⏳</span> <span>Menyimpan...</span>`;

            try {
                const respon = await fetch(API_SHEET_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ tipe: tipe, payload: payload })
                });

                const hasil = await respon.json();
                
                if (hasil.status === "SUCCESS") {
                    alert("Sukses! Perubahan berhasil disimpan ke sheet.");
                } else {
                    alert("Gagal menyimpan: " + hasil.message);
                }

                tutupPopupEdit();
                document.getElementById('mainContent').classList.add('hidden');
                document.getElementById('loadingState').classList.remove('hidden');
                
                await ambilDataIdentitas();

            } catch (error) {
                console.error(error);
                alert("Proses pengiriman selesai!");
                tutupPopupEdit();
                window.location.reload();
            } finally {
                btnSimpan.disabled = false;
                btnSimpan.innerHTML = `<span>💾</span> <span>Simpan Data</span>`;
            }
        }

        window.onload = ambilDataIdentitas;
    </script>
</body>
</html>
