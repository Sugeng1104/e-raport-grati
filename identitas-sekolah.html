<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identitas Sekolah - UPT SDN Ranuklindungan I</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-800">

    <header class="bg-[#1e6ca8] text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🏛️</span>
                <h1 class="text-xl font-bold tracking-wide" id="headerNamaSekolah">Memuat Data...</h1>
            </div>
            <a href="index.html" class="bg-white/20 hover:bg-white/30 text-white font-medium px-4 py-2 rounded-lg transition text-sm flex items-center space-x-1">
                <span>⬅️</span> <span>Kembali ke Hub Utama</span>
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-6">
        
        <div id="loadingState" class="text-center py-12 bg-white rounded-2xl shadow-sm border border-slate-200">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent mb-2"></div>
            <p class="text-slate-500 font-medium">Menarik data dari Google Sheets Anda secara Real-time...</p>
        </div>

        <div id="mainContent" class="grid grid-cols-1 lg:grid-cols-12 gap-6 hidden">
            
            <section class="lg:col-span-7 space-y-6">
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-900 border-b pb-3 mb-4 flex items-center space-x-2">
                        <span class="text-blue-500">🏛️</span> <span>Profil & Legalitas Sekolah</span>
                    </h2>
                    <dl class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-3 text-sm" id="dataProfil">
                        </dl>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-900 border-b pb-3 mb-4 flex items-center space-x-2">
                        <span class="text-emerald-500">👥</span> <span>Manajemen Personalia & Tahun Ajaran</span>
                    </h2>
                    <dl class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-3 text-sm" id="dataPersonalia">
                        </dl>
                </div>
            </section>

            <section class="lg:col-span-5 space-y-6">
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-900 border-b pb-3 mb-3 flex items-center space-x-2">
                        <span class="text-indigo-500">📚</span> <span>Daftar Mata Pelajaran</span>
                    </h2>
                    <div class="overflow-hidden border border-slate-200 rounded-xl">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="bg-slate-50 text-slate-600 font-semibold border-b border-slate-200">
                                    <th class="p-3 w-16 text-center">No</th>
                                    <th class="p-3">Nama Mata Pelajaran</th>
                                </tr>
                            </thead>
                            <tbody id="tabelMapel" class="divide-y divide-slate-100">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-900 border-b pb-3 mb-3 flex items-center space-x-2">
                        <span class="text-amber-500">🏅</span> <span>Kegiatan Ekstrakurikuler</span>
                    </h2>
                    <div class="overflow-hidden border border-slate-200 rounded-xl">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="bg-slate-50 text-slate-600 font-semibold border-b border-slate-200">
                                    <th class="p-3 w-16 text-center">ID</th>
                                    <th class="p-3">Ekstrakurikuler</th>
                                </tr>
                            </thead>
                            <tbody id="tabelEkskul" class="divide-y divide-slate-100">
                                </tbody>
                        </table>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script>
        // Memakai URL Web App Apps Script milik Anda secara presisi
        const API_SHEET_URL = "https://script.google.com/macros/s/AKfycbzaX845-m1zvy8akoQVibGx8Vu62oXbn2qtPJVExSi3Jd5aFSahoNIqTmQILpShU8zeTw/exec";

        function cetakBarisInfo(label, value) {
            if (!value) return '';
            return `
                <div class="py-2 border-b border-slate-100">
                    <dt class="text-xs font-bold text-slate-400 uppercase tracking-wide">${label}</dt>
                    <dd class="text-sm font-semibold text-slate-700 mt-0.5">${value}</dd>
                </div>
            `;
        }

        async function ambilDataIdentitas() {
            try {
                // TAMBAHAN ARSITEKTUR: Menggunakan mode 'cors' dan mengizinkan 'follow' redirect dari Google
                const respon = await fetch(`${API_SHEET_URL}?action=getIdentitas`, {
                    method: "GET",
                    mode: "cors",
                    redirect: "follow" // <--- Ini kunci utama agar data dari Google mau mengalir ke GitHub!
                });
                
                const json = await respon.json();
                
                if (json.status !== "SUCCESS") {
                    throw new Error(json.message);
                }
                
                // 1. Render Profil & Legalitas (Kolom Kiri Atas)
                let htmlProfil = "";
                const listGrupProfil = ["Nama Sekolah", "NPSN", "NSS", "Alamat Sekolah", "Kode Pos", "Desa / Kelurahan", "Kecamatan", "Kabupaten", "Provinsi", "Website", "E-mail"];
                listGrupProfil.forEach(key => {
                    if (json.profil[key]) {
                        htmlProfil += generateRow(key, json.profil[key]);
                    }
                });
                document.getElementById('dataProfil').innerHTML = htmlProfil;
                
                // Set nama sekolah di navbar secara dinamis
                if(json.profil["Nama Sekolah"]) {
                    document.getElementById('headerNamaSekolah').innerText = json.profil["Nama Sekolah"];
                }

                // 2. Render Waktu & Personalia (Kolom Kiri Bawah)
                let htmlPersonalia = "";
                // Kita ambil semua key yang ada di json.profil namun tidak termasuk dalam grup profil utama
                Object.keys(json.profil).forEach(key => {
                    if (!listGrupProfil.includes(key)) {
                        htmlPersonalia += generateRow(key, json.profil[key]);
                    }
                });
                document.getElementById('dataPersonalia').innerHTML = htmlPersonalia;

                // 3. Render Tabel Mata Pelajaran (Kolom Kanan Atas)
                let htmlMapel = "";
                json.mapel.forEach(item => {
                    htmlMapel += `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="p-3 text-center font-bold text-blue-500 bg-slate-50/50">${item.no}</td>
                            <td class="p-3 font-medium text-slate-700">${item.nama}</td>
                        </tr>
                    `;
                });
                document.getElementById('tabelMapel').innerHTML = htmlMapel;

                // 4. Render Tabel Ekstrakurikuler (Kolom Kanan Bawah)
                let htmlEkskul = "";
                json.ekskul.forEach(item => {
                    htmlEkskul += `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="p-3 text-center font-bold text-amber-500 bg-slate-50/50">${item.id}</td>
                            <td class="p-3 font-medium text-slate-700">${item.nama}</td>
                        </tr>
                    `;
                });
                document.getElementById('tabelEkskul').innerHTML = htmlEkskul;

                // Sembunyikan loading, tampilkan dashboard utama identitas
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');

            } catch (error) {
                console.error(error);
                document.getElementById('loadingState').innerHTML = `
                    <div class="p-4 text-red-600 bg-red-50 rounded-xl border border-red-200 inline-block text-left max-w-md">
                        <p class="font-bold">⚠️ Gagal Memproses Sinkronisasi Data</p>
                        <p class="text-xs text-slate-500 mt-1">Detail Masalah: ${error.message}</p>
                        <p class="text-xs text-slate-400 mt-2 font-mono bg-white p-2 rounded border">Solusi: Pastikan URL Apps Script di kode HTML Anda sudah menggunakan versi /exec terbaru.</p>
                    </div>
                `;
            }
        }
        window.onload = ambilDataIdentitas;
    </script>
</body>
</html>
