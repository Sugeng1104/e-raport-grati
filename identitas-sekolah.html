<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identitas Sekolah - UPT SDN Ranuklindungan I</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-800">

    <header class="bg-[#1e6ca8] text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🏛️</span>
                <h1 class="text-xl font-bold tracking-wide" id="headerNamaSekolah">UPT SDN Ranuklindungan I</h1>
            </div>
            <a href="index.html" class="bg-white/20 hover:bg-white/30 text-white font-medium px-4 py-2 rounded-lg transition text-sm flex items-center space-x-1">
                <span>⬅️</span> <span>Kembali ke Hub</span>
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-6">
        
        <div id="loadingState" class="text-center py-12 bg-white rounded-2xl shadow-sm border border-slate-200">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent mb-2"></div>
            <p class="text-slate-500 font-medium">Sinkronisasi data langsung dari Google Sheets...</p>
        </div>

        <div id="mainContent" class="grid grid-cols-1 lg:grid-cols-12 gap-6 hidden">
            
            <section class="lg:col-span-7 space-y-6">
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-900 border-b pb-3 mb-4 flex items-center space-x-2">
                        <span>ℹ️</span> <span>Profil & Legalitas Sekolah</span>
                    </h2>
                    <dl class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-3 text-sm" id="dataProfil">
                        </dl>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-900 border-b pb-3 mb-4 flex items-center space-x-2">
                        <span>👥</span> <span>Manajemen & Tahun Pelajaran</span>
                    </h2>
                    <dl class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-3 text-sm" id="dataPersonalia">
                        </dl>
                </div>
            </section>

            <section class="lg:col-span-5 space-y-6">
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-900 border-b pb-3 mb-3 flex items-center space-x-2">
                        <span>📚</span> <span>Kurikulum: Mata Pelajaran</span>
                    </h2>
                    <div class="overflow-hidden border border-slate-200 rounded-xl">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="bg-slate-50 text-slate-600 font-semibold border-b border-slate-200">
                                    <th class="p-3 w-16 text-center">No</th>
                                    <th class="p-3">Nama Mata Pelajaran</th>
                                </tr>
                            </thead>
                            <tbody id="tabelMapel" class="divide-y divide-slate-100">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-900 border-b pb-3 mb-3 flex items-center space-x-2">
                        <span>🏅</span> <span>Kegiatan Ekstrakurikuler</span>
                    </h2>
                    <div class="overflow-hidden border border-slate-200 rounded-xl">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="bg-slate-50 text-slate-600 font-semibold border-b border-slate-200">
                                    <th class="p-3 w-16 text-center">ID</th>
                                    <th class="p-3">Nama Ekstrakurikuler</th>
                                </tr>
                            </thead>
                            <tbody id="tabelEkskul" class="divide-y divide-slate-100">
                                </tbody>
                        </table>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script>
        // Masukkan URL Google Apps Script Web App Anda di sini
        const API_SHEET_URL = "URL_GOOGLE_APPS_SCRIPT_ANDA_DISINI";

        // Fungsi bantu membuat baris deskripsi data (Key-Value)
        function buatRowInfo(label, value) {
            if (!value) return '';
            return `
                <div class="py-2 border-b border-slate-100 md:border-none">
                    <dt class="text-xs font-semibold text-slate-400 uppercase tracking-wider">${label}</dt>
                    <dd class="text-sm font-medium text-slate-800 mt-0.5">${value}</dd>
                </div>
            `;
        }

        async function muatDataIdentitas() {
            try {
                // Fetch data dari Google Apps Script yang mengembalikan seluruh baris sheet 'identitas_sekolah'
                const respon = await fetch(`${API_SHEET_URL}?action=getIdentitas`);
                const json = await respon.json();
                
                if (json.status !== "SUCCESS") throw new Error(json.message);
                
                const rows = json.data; // Mengasumsikan respons berupa array 2 dimensi dari sheet

                // 1. PROSES KELOMPOK DOKUMEN: IDENTITAS & PERSONALIA (Kolom A & B)
                let htmlProfil = "";
                let htmlPersonalia = "";
                
                rows.forEach(row => {
                    const key = row[0] ? row[0].toString().trim() : "";
                    const val = row[1] ? row[1].toString().trim() : "";
                    
                    if (key && val) {
                        // Pilah grup agar UI terstruktur rapi
                        if (["Nama Sekolah", "NPSN", "NSS", "Alamat Sekolah", "Kode Pos", "Desa / Kelurahan", "Kecamatan", "Kabupaten", "Provinsi", "Website", "E-mail"].includes(key)) {
                            htmlProfil += buatRowInfo(key, val);
                            if (key === "Nama Sekolah") {
                                document.getElementById('headerNamaSekolah').innerText = val;
                            }
                        } else {
                            htmlPersonalia += buatRowInfo(key, val);
                        }
                    }
                });
                document.getElementById('dataProfil').innerHTML = htmlProfil;
                document.getElementById('dataPersonalia').innerHTML = htmlPersonalia;

                // 2. PROSES KELOMPOK DOKUMEN: MATA PELAJARAN (Kolom C & D)
                let htmlMapel = "";
                rows.forEach((row, indeks) => {
                    if (indeks === 0) return; // Lewati header tabel spreadsheet
                    const noMapel = row[2] ? row[2].toString().trim() : "";
                    const namaMapel = row[3] ? row[3].toString().trim() : "";
                    if (noMapel || namaMapel) {
                        htmlMapel += `
                            <tr class="hover:bg-slate-50 transition">
                                <td class="p-3 text-center font-bold text-slate-400">${noMapel}</td>
                                <td class="p-3 font-semibold text-slate-700">${namaMapel}</td>
                            </tr>
                        `;
                    }
                });
                document.getElementById('tabelMapel').innerHTML = htmlMapel;

                // 3. PROSES KELOMPOK DOKUMEN: EKSTRAKURIKULER (Kolom E & F)
                let htmlEkskul = "";
                rows.forEach((row, indeks) => {
                    if (indeks === 0) return; // Lewati header tabel
                    const idEks = row[4] ? row[4].toString().trim() : "";
                    const namaEks = row[5] ? row[5].toString().trim() : "";
                    if (idEks || namaEks) {
                        htmlEkskul += `
                            <tr class="hover:bg-slate-50 transition">
                                <td class="p-3 text-center font-bold text-slate-400">${idEks}</td>
                                <td class="p-3 font-semibold text-slate-700">${namaEks}</td>
                            </tr>
                        `;
                    }
                });
                document.getElementById('tabelEkskul').innerHTML = htmlEkskul;

                // Modifikasi State UI
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');

            } catch ( error ) {
                console.error(error);
                document.getElementById('loadingState').innerHTML = `
                    <p class="text-red-500 font-bold">⚠️ Gagal Memuat Data</p>
                    <p class="text-xs text-slate-400 mt-1">Pastikan URL Apps Script benar dan izin akses diatur ke 'Anyone'.</p>
                `;
            }
        }

        // Jalankan fungsi otomatis saat halaman dimuat
        window.onload = muatDataIdentitas;
    </script>
</body>
</html>
