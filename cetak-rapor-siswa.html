<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pemroses Data Rapor - UPT SDN Ranuklindungan I</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans p-4 md:p-8 text-slate-800">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-lg font-black text-slate-900 tracking-tight">🎛️ Panel Verifikasi & Cetak Rapor</h1>
                <p class="text-xs text-slate-500 font-medium">Lakukan verifikasi nilai Sumatif Harian & ASAS sebelum melakukan cetak rapor.</p>
            </div>
            <div class="flex items-center gap-2 w-full md:w-auto">
                <input type="number" id="inputNoAbsen" placeholder="No. Absen" class="w-full md:w-28 px-4 py-2.5 border border-slate-200 rounded-2xl text-xs font-bold focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="ambilNilaiSiswa()" class="px-5 py-2.5 bg-slate-900 hover:bg-slate-800 text-white font-bold text-xs rounded-2xl transition whitespace-nowrap">🔍 Ambil Data</button>
            </div>
        </div>

        <div id="boxTabelAtas" class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-sm text-slate-900">📊 Lembar Verifikasi Nilai Rapor: <span id="namaSiswaLabel" class="text-blue-600 uppercase"></span> (<span id="nisnSiswaLabel" class="text-slate-500"></span>)</h2>
                <span class="px-2.5 py-1 bg-emerald-50 text-emerald-700 rounded-lg text-[10px] font-bold">Status: Terkoneksi</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs border border-slate-200 rounded-xl overflow-hidden">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-slate-600 font-bold">
                            <th class="p-3">Mata Pelajaran</th>
                            <th class="p-3 text-center">Rata-Rata Sumatif Harian</th>
                            <th class="p-3 text-center">Nilai Murni ASAS</th>
                        </tr>
                    </thead>
                    <tbody id="rowNilaiMurni" class="divide-y divide-slate-100 font-semibold text-slate-700">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbydH3Oe4KcSH7keRwH8KoBjzpBkJYf1QxIHy9-qz5FwokLrb13LVxv8CJ1RaFWv5lX_yw/exec";

        async function ambilNilaiSiswa() {
            const noAbsen = document.getElementById('inputNoAbsen').value.trim();
            if(!noAbsen) return alert("Isi No. Absen terlebih dahulu!");
            
            document.getElementById('boxTabelAtas').classList.add('hidden');

            try {
                const res = await fetch(`${API_URL}?action=baca_nilai_rapor&no_absen=${noAbsen}`);
                const responseData = await res.json();
                
                if(responseData.status === "SUCCESS") {
                    document.getElementById('namaSiswaLabel').innerText = responseData.nama;
                    document.getElementById('nisnSiswaLabel').innerText = responseData.nisn ? "NISN: " + responseData.nisn : "Tidak ada NISN";
                    
                    const tbody = document.getElementById('rowNilaiMurni');
                    tbody.innerHTML = "";
                    
                    // List 10 Mata Pelajaran Utama
                    const mapelList = [
                        { key: "Agama", label: "Agama" },
                        { key: "B. Indonesia", label: "B. Indonesia" },
                        { key: "Pancasila", label: "Pancasila" },
                        { key: "Matematika", label: "Matematika" },
                        { key: "IPAS", label: "IPAS" },
                        { key: "PJOK", label: "PJOK" },
                        { key: "Kesenian", label: "Kesenian" },
                        { key: "B. Jawa", label: "B. Jawa" },
                        { key: "B. Inggris", label: "B. Inggris" },
                        { key: "BTQ", label: "BTQ" }
                    ];
                    
                    mapelList.forEach(m => {
                        const tr = document.createElement('tr');
                        
                        // Validasi jika nilai kosong/tidak terisi
                        const nilaiHarian = responseData.dataHarian[m.key] !== undefined && responseData.dataHarian[m.key] !== "" ? responseData.dataHarian[m.key] : "-";
                        const nilaiAsas = responseData.dataAsas[m.key] !== undefined && responseData.dataAsas[m.key] !== "" ? responseData.dataAsas[m.key] : "-";
                        
                        tr.innerHTML = `
                            <td class="p-3 font-bold text-slate-800">${m.label}</td>
                            <td class="p-3 text-center text-emerald-600 font-black text-sm">${nilaiHarian}</td>
                            <td class="p-3 text-center text-blue-600 font-black text-sm">${nilaiAsas}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                    
                    document.getElementById('boxTabelAtas').classList.remove('hidden');
                } else {
                    alert(responseData.message);
                }
            } catch(e) {
                console.error(e);
                alert("Koneksi gagal membaca database atau no_absen tidak terdaftar.");
            }
        }
    </script>
</body>
</html>
